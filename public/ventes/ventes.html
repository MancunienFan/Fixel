<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Ventes - FixEl</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/auth.js"></script>
</head>

<body>
  <nav id="sidebar"></nav>

  <main class="main-content container">
    <div class="section-header">
      <div>
        <h1>Ventes</h1>
        <p class="section-subtitle">Historique des ventes, paiements et factures.</p>
      </div>
      <div class="page-actions">
        <a class="table-link-button" href="/ventes/vente.html">Nouvelle vente</a>
        <button type="button" id="btnRefreshVentes">Actualiser</button>
      </div>
    </div>

    <section class="filters-panel" aria-label="Filtres ventes">
      <label>Recherche client
        <input type="search" id="filtreClient" placeholder="Nom, courriel ou vente rapide">
      </label>
      <label>Du
        <input type="date" id="filtreDateDebut">
      </label>
      <label>Au
        <input type="date" id="filtreDateFin">
      </label>
      <label>Paiement
        <select id="filtreStatutPaiement">
          <option value="">Tous</option>
          <option value="paye">Payé</option>
          <option value="partiellement paye">Partiellement payé</option>
          <option value="non paye">Non payé</option>
        </select>
      </label>
      <label>Mode
        <select id="filtreModePaiement">
          <option value="">Tous</option>
          <option value="comptant">Comptant</option>
          <option value="interac">Interac</option>
          <option value="virement">Virement</option>
          <option value="carte">Carte</option>
          <option value="autre">Autre</option>
        </select>
      </label>
      <label>Facture
        <select id="filtreFactureGeneree">
          <option value="">Toutes</option>
          <option value="true">Générée</option>
          <option value="false">Non générée</option>
        </select>
      </label>
      <label>Email
        <select id="filtreFactureEnvoyee">
          <option value="">Tous</option>
          <option value="true">Envoyée</option>
          <option value="false">Non envoyée</option>
        </select>
      </label>
      <label>Taxes
        <select id="filtreTaxes">
          <option value="">Toutes</option>
          <option value="true">Oui</option>
          <option value="false">Non</option>
        </select>
      </label>
      <div class="filter-actions">
        <button type="button" id="btnResetFiltresVentes">Réinitialiser</button>
      </div>
    </section>

    <p class="table-summary">Ventes affichées : <strong id="ventesCount">0</strong></p>

    <div class="table-container">
      <table id="ventesTable">
        <thead>
          <tr>
            <th>No vente</th>
            <th>Date</th>
            <th>Client</th>
            <th>Total</th>
            <th>Profit</th>
            <th>Mode</th>
            <th>Paiement</th>
            <th>Taxes</th>
            <th>PDF</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="11">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="/ventes/ventes.js"></script>
  <script src="/sidebar.js"></script>
</body>

</html>
