<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Produit</title>
  <link rel="stylesheet" href="../style.css">
  <script src="/auth.js"></script>
</head>

<body>
  <nav id="sidebar"></nav>

  <main class="main-content container">
   
    <h1>Produit</h1>

    <form id="form-produit">
      <div class="device-detect-panel">
        <button type="button" id="btn-detecter-telephone">Détecter le téléphone branché</button>
        <p id="device-detect-message" class="device-detect-message" aria-live="polite"></p>
      </div>

      <div class="champ">
        <label>Produit
          <input type="text" name="nom" required>
        </label>
      </div>
      <div class="champ">
        <label for="type">Type
          <select id="type" name="type" required>
            <option value="stock">Stock</option>
            <option value="client">Client</option>
          </select>
        </label>
      </div>

      <div class="champ" id="champ-statut">
        <label>Statut
          <select name="statut" required>
            <option value="neuf">Neuf</option>
            <option value="bon état">Bon état</option>
            <option value="mauvais état">Mauvais état</option>
          </select>
        </label>
      </div>

      <div class="champ" id="champ-prix">
        <label>Prix
          <input type="number" name="prix" id="prix" required>
        </label>
      </div>

      <div class="champ" id="champ-categorie">
      <label >Catégorie
        <input type="text" name="categorie">
      </label>
      </div>

      <div class="champ" id="champ-etatbatterie">
      <label id="etatbatterie">État Batterie (%)
        <input type="number" name="etatbatterie">
      </label>
      </div>

       <div class="champ" id="champ-modele">
      <label>Modèle
        <input type="text" name="model">
      </label>
    </div>
     <div class="champ" id="champ-imei">
      <label>Numéro de série
        <input type="text" name="imei">
      </label>
     </div>

      <div class="champ" id="champ-prixachat">
      <label >Prix d'achat
        <input type="number" name="prixachat" step="0.01">
      </label>
      </div>

      <div class="champ" id="champ-prixvente">
      <label >Prix de vente
        <input type="number" name="prixvente" step="0.01">
      </label>
      </div>

      <div class="champ" id="champ-disponibilite">
      <label >Disponibilité
        <select name="disponibilite" id="disponibilite" required>
          <option value="disponible">Disponible</option>
          <option value="vendu">Vendu</option>
          <option value="Pour pièces">Pour pièces</option>
        </select>
      </label>
   
</div>

      <label style="grid-column: 1 / -1;">Notes
        <textarea name="notes" rows="4"></textarea>
      </label>

      <div class="actions">
        <button type="submit" id="submit">✅ Enregistrer</button>
        <button type="button" onclick="window.location.href='../../index.html'">⬅️ Retour</button>
        <button type="button" id="btn-update" class="btn-warning">✏️ Mise à jour</button>
        <button type="button" id="btn-delete" class="btn-danger">🗑️ Effacer</button>
        <button type="button" id="btn-ajouter-reparation">➕ Ajouter réparation</button>
      </div>

    </form>
  </main>

  <div class="container" id="reparations-container" style="display: none;">
    <h2>Réparations</h2>
    <table id="table-reparations">
      <thead>
        <tr>

          <th>Description</th>
          <th>Prix</th>
          <th>Statut</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <!-- Les réparations seront injectées ici -->
      </tbody>
    </table>
  </div>

  <div class="container" id="sav-produit-container" style="display: none;">
    <div class="section-header">
      <div>
        <h2>Retours / SAV</h2>
        <p class="section-subtitle">Historique des retours associes a cet appareil.</p>
      </div>
    </div>
    <div class="table-container">
      <table id="table-sav-produit">
        <thead>
          <tr>
            <th>No SAV</th>
            <th>Date</th>
            <th>Client</th>
            <th>Probleme</th>
            <th>Garantie</th>
            <th>Statut</th>
            <th>Cout</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>


  <script src="produit.js"></script>
     <script src="../sidebar.js"></script>
</body>

</html>
