<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réparation</title>
  <link rel="stylesheet" href="../style.css">
  <script src="/auth.js"></script>

</head>
<body>
  <nav id="sidebar"></nav>

  <main class="main-content container">
    <h1>Réparation</h1>

    <form id="form-reparation">
    

      <label>Description
        <input type="text" name="description" required>
      </label>

      <label>prix
        <input type="number" name="prix" required step="0.01">
      </label>

      <label>Coût de la pièce
        <input type="number" name="coutPiece" min="0" step="0.01">
      </label>

      <label>Etape
        <select name="statut" id="statut" required>
          <option value="recu">Recu</option>
          <option value="diagnostic">Diagnostic</option>
          <option value="en attente piece">En attente piece</option>
          <option value="en reparation">En reparation</option>
          <option value="pret">Pret</option>
          <option value="livre">Livre</option>
          <option value="annule">Annule</option>
        </select>
      </label>

      <label>Note de changement d'etape
        <input type="text" name="noteTransition" id="noteTransition" maxlength="500">
      </label>

      <section class="workflow-panel" aria-label="Dates du workflow">
        <h3>Suivi</h3>
        <div class="workflow-actions" id="workflowActions"></div>
        <div class="workflow-grid">
          <label>Reception
            <input type="text" id="dateReception" disabled>
          </label>
          <label>Diagnostic
            <input type="text" id="dateDiagnostic" disabled>
          </label>
          <label>Attente piece
            <input type="text" id="dateAttentePiece" disabled>
          </label>
          <label>Debut reparation
            <input type="text" id="dateDebutReparation" disabled>
          </label>
          <label>Pret
            <input type="text" id="datePret" disabled>
          </label>
          <label>Livraison
            <input type="text" id="dateLivraison" disabled>
          </label>
          <label>Annulation
            <input type="text" id="dateAnnulation" disabled>
          </label>
        </div>

        <h3>Historique</h3>
        <div class="workflow-history" id="workflowHistory">
          Aucun historique disponible.
        </div>
      </section>

        <label style="grid-column: 1 / -1;">Notes
        <textarea name="notes" rows="4"
          ></textarea>
      </label>

      <!-- Produit ID caché -->
      <input type="hidden" name="produit" id="produitId">

      <div class="actions">
        <button type="submit" id="btn-enregistrer"> Enregistrer</button>
        <button type="button" id="btn-update"> Mettre à jour</button>
        <button type="button" id="btn-delete"> Effacer</button>
        <button type="button" id="btn-retour"> Retour</button>
      </div>
      
    </form>
  </main>

  <script src="reparation.js"></script>
  <script src="../sidebar.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      checkTokenExpiration();
    });
  </script>
</body>
</html>
