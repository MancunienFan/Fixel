<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Factures - FixEl</title>
  <link rel="stylesheet" href="../style.css">
  <script src="/auth.js"></script>
</head>

<body>
  <nav id="sidebar"></nav>

  <main class="main-content container">
    <h1>Créer une facture</h1>

    <form id="factureForm">
      <label>Client
        <select id="clientSelect" required>
          <option value="">-- Sélectionnez un client --</option>
        </select>
      </label>

      <label id="produitContainer" style="display: none;">Produit
        <select id="produitSelect" required>
          <option value="">-- Sélectionnez un produit --</option>
        </select>
      </label>

      <label id="reparationContainer" style="display: none;">Réparations
        <select id="reparationSelect" multiple size="5" required>
          <option value="">-- Sélectionnez une réparation --</option>
        </select>
      </label>

      <div id="detailsContainer" style="display: none;">
        <h3>Détails</h3>
      </div>

      <div id="checkboxContainer" class="invoice-options" style="display: none;">
        <label>
          <input type="checkbox" id="telechargerCheckbox">
          Télécharger la facture après création
        </label>
        <label>
          <input type="checkbox" id="inclureTaxesCheckbox">
          Inclure les taxes TPS + TVQ
        </label>
        <label>
          <input type="checkbox" id="envoyerMailCheckbox">
          Envoyer la facture par email
        </label>
      </div>

      <div class="actions">
        <button id="genererPdfBtn" type="submit" style="display: none;">Créer la facture</button>
      </div>
    </form>
  </main>

  <main class="main-content container">
    <div class="section-header">
      <div>
        <h2>Factures</h2>
        <p class="section-subtitle">Historique, téléchargement et suivi des paiements.</p>
      </div>
      <button type="button" id="btnRefreshFactures">Actualiser</button>
    </div>

    <section class="filters-panel" aria-label="Recherche de factures">
      <label>No de facture
        <input type="search" id="rechercheNumeroFacture" placeholder="Ex. 1024">
      </label>

      <label>Nom client
        <input type="search" id="rechercheClientFacture" placeholder="Nom ou prénom">
      </label>

      <label>Type
        <select id="filtreTypeFacture">
          <option value="">Toutes</option>
          <option value="vente">Vente</option>
          <option value="reparation">RÃ©paration</option>
          <option value="sav">SAV</option>
          <option value="autre">Autre</option>
        </select>
      </label>

      <label>Paiement
        <select id="filtreStatutPaiement">
          <option value="">Tous</option>
          <option value="paye">PayÃ©</option>
          <option value="partiellement paye">Partiellement payÃ©</option>
          <option value="non paye">Non payÃ©</option>
        </select>
      </label>

      <label>Email envoyÃ©
        <select id="filtreEmailEnvoye">
          <option value="">Tous</option>
          <option value="true">Oui</option>
          <option value="false">Non</option>
        </select>
      </label>

      <label>PDF
        <select id="filtrePdfDisponible">
          <option value="">Tous</option>
          <option value="true">Oui</option>
          <option value="false">Non</option>
        </select>
      </label>

      <label>Statut facture
        <select id="filtreStatutFacture">
          <option value="">Toutes</option>
          <option value="active">Active</option>
          <option value="annulee">AnnulÃ©e</option>
        </select>
      </label>

      <label>Du
        <input type="date" id="rechercheDateDebut">
      </label>

      <label>Au
        <input type="date" id="rechercheDateFin">
      </label>

      <div class="filter-actions">
        <button type="button" id="btnResetRechercheFactures">Réinitialiser</button>
      </div>
    </section>

    <p class="table-summary">
      Factures affichées : <strong id="facturesCount">0</strong>
    </p>

    <div class="table-container">
      <table id="facturesTable">
        <thead>
          <tr>
            <th>No facture</th>
            <th>Date</th>
            <th>Type</th>
            <th>Client</th>
            <th>Source</th>
            <th>Total</th>
            <th>Paiement</th>
            <th>Email</th>
            <th>PDF</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="11">Chargement des factures...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="facture.js"></script>
  <script src="../sidebar.js"></script>
  <script src="../scrollTop.js"></script>
</body>

</html>
