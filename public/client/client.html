<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Client</title>
  <link rel="stylesheet" href="../style.css" />
  <script src="/auth.js"></script>
</head>

<body>
    <nav id="sidebar"></nav>

  <main class="main-content container">
    <h1>Client</h1>

    <form id="form-client">
      <input type="hidden" id="clientId" name="clientId">

      <label>Nom
        <input type="text" id="nom" name="nom" required>
      </label>

      <label>Prénom
        <input type="text" id="prenom" name="prenom" required>
      </label>

      <label>Téléphone
        <input type="tel" id="telephone" name="telephone" required>
      </label>

      <label>Email
        <input type="email" id="email" name="email">
      </label>

      <!-- ... -->
      <label>Date de création
        <input type="text" id="dateCreation" name="dateCreation" disabled>
      </label>

      <label>Dernière modification
        <input type="text" id="dateModification" name="dateModification" disabled>
      </label>
      <!-- ... -->


      <label style="grid-column: 1 / -1;">Notes
        <textarea id="notes" name="notes" rows="4"></textarea>
      </label>

      <div class="actions">
        <button type="submit" id="submit"> Enregistrer</button>
        <button type="button" onclick="window.location.href='clients.html'"> Retour</button>
        <button type="button" id="btn-update" class="btn-warning"> Mise à jour</button>
        <button type="button" id="btn-delete" class="btn-danger"> Effacer</button>
        <button type="button" id="btn-ajout-reparation"> Ajouter téléphone</button>
      </div>
    </form>
  </main>

 <div class="sub-container" id="produits-section">
  <h2>Téléphones Réparés</h2>

  <div class="table-container">
    <table id="produits-table">
      <thead>
        <tr>
          <th>Modèle</th>
          <th>Nom</th>
          <th>Numéro de série</th>
          <th>Dernière modification</th>
        </tr>
      </thead>
      <tbody>
        <!-- Lignes dynamiques ici -->
      </tbody>
    </table>
  </div>
</div>

<div class="sub-container" id="sav-section" style="display: none;">
  <div class="section-header">
    <div>
      <h2>Retours / SAV</h2>
      <p class="section-subtitle">Historique des retours associes a ce client.</p>
    </div>
  </div>

  <div class="table-container">
    <table id="sav-client-table">
      <thead>
        <tr>
          <th>No SAV</th>
          <th>Date</th>
          <th>Produit</th>
          <th>Probleme</th>
          <th>Garantie</th>
          <th>Statut</th>
          <th>Cout</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>




  <script src="client.js"></script>
  <script src="../sidebar.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      checkTokenExpiration();
    });
  </script>
</body>

</html>
