<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Client</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
    <nav id="navbar"></nav>

  <div class="container">
    <h1>Client</h1>

    <form id="form-client">
      <input type="hidden" id="clientId" name="clientId">

      <label>Nom
        <input type="text" id="nom" name="nom" required>
      </label>

      <label>Prénom
        <input type="text" id="prenom" name="prenom" required>
      </label>

      <label>Téléphone
        <input type="tel" id="telephone" name="telephone" required>
      </label>

      <label>Email
        <input type="email" id="email" name="email">
      </label>

      <!-- ... -->
      <label>Date de création
        <input type="text" id="dateCreation" name="dateCreation" disabled>
      </label>

      <label>Dernière modification
        <input type="text" id="dateModification" name="dateModification" disabled>
      </label>
      <!-- ... -->


      <label style="grid-column: 1 / -1;">Notes
        <textarea id="notes" name="notes" rows="4"></textarea>
      </label>

      <div class="actions">
        <button type="submit" id="submit">✅ Enregistrer</button>
        <button type="button" onclick="window.location.href='clients.html'">⬅️ Retour</button>
        <button type="button" id="btn-update" class="btn-warning">✏️ Mise à jour</button>
        <button type="button" id="btn-delete" class="btn-danger">🗑️ Effacer</button>
        <button type="button" id="btn-ajout-reparation">➕ Ajouter téléphone</button>
      </div>
    </form>
  </div>

 <div class="sub-container" id="produits-section">
  <h2>Téléphones Réparés</h2>

  <div class="table-container">
    <table id="produits-table">
      <thead>
        <tr>
          <th>Modèle</th>
          <th>Nom</th>
          <th>IMEI</th>
          <th>Dernière modification</th>
        </tr>
      </thead>
      <tbody>
        <!-- Lignes dynamiques ici -->
      </tbody>
    </table>
  </div>
</div>




  <script src="client.js"></script>
  <script src="../navbar.js"></script>
</body>

</html>
