<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Activer mon compte - FixEl</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <main class="container">
    <h1>Activer mon compte</h1>
    <p class="section-subtitle" id="invitation-message">Verification de l'invitation...</p>

    <form id="form-accept-invitation" style="display: none;">
      <label>Mot de passe
        <input type="password" id="motdepasse" required minlength="12" autocomplete="new-password">
      </label>

      <label>Confirmer le mot de passe
        <input type="password" id="confirmation" required minlength="12" autocomplete="new-password">
      </label>

      <div class="actions">
        <button type="submit">Activer mon compte</button>
        <button type="button" id="btn-login">Connexion</button>
      </div>
    </form>
  </main>

  <script src="/invitation/accept.js"></script>
</body>

</html>
