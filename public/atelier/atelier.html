<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Atelier - FixEl</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/auth.js"></script>
</head>

<body>
  <nav id="navbar"></nav>

  <main class="container atelier-container">
    <div class="section-header">
      <div>
        <h1>Atelier</h1>
        <p class="section-subtitle">Reparations actives par etape, avec priorite SLA.</p>
      </div>
      <button type="button" id="btnRefreshAtelier">Actualiser</button>
    </div>

    <section class="atelier-summary" aria-label="Resume atelier">
      <article class="metric-card">
        <span class="metric-label">Actives</span>
        <strong id="atelierTotal">0</strong>
      </article>
      <article class="metric-card metric-card-warning">
        <span class="metric-label">En retard</span>
        <strong id="atelierRetards">0</strong>
      </article>
      <article class="metric-card">
        <span class="metric-label">A surveiller</span>
        <strong id="atelierAttentions">0</strong>
      </article>
    </section>

    <section class="kanban-board" id="kanbanBoard" aria-label="Workflow atelier"></section>
  </main>

  <script src="/atelier/atelier.js"></script>
  <script src="/navbar.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      checkTokenExpiration();
    });
  </script>
</body>

</html>
